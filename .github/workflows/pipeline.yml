name: Japan Stock ML Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"   # 毎週月曜 2:00 UTC (JST 11:00)
  workflow_dispatch:
    inputs:
      skip_download:
        description: "データダウンロードをスキップ (キャッシュがある場合)"
        required: false
        default: "false"
      signals_only:
        description: "シグナル生成のみ実行"
        required: false
        default: "false"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -q requests pandas numpy lightgbm scikit-learn openpyxl gdown

      - name: Cache output data
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/output/price_clean_valuation.csv
            ${{ github.workspace }}/output/irbank_pl.xlsx
          key: gdrive-data-${{ secrets.GDRIVE_PRICE_FILE_ID }}-${{ secrets.GDRIVE_IRBANK_FILE_ID }}

      - name: Step 1 - データダウンロード
        if: ${{ github.event.inputs.signals_only != 'true' && github.event.inputs.skip_download != 'true' }}
        env:
          GDRIVE_PRICE_FILE_ID: ${{ secrets.GDRIVE_PRICE_FILE_ID }}
          GDRIVE_IRBANK_FILE_ID: ${{ secrets.GDRIVE_IRBANK_FILE_ID }}
        run: |
          mkdir -p output
          python -c "from pipeline import download_data; download_data.run()"

      - name: Step 2 - 特徴量エンジニアリング (irbank)
        if: ${{ github.event.inputs.signals_only != 'true' }}
        run: |
          mkdir -p output
          python -c "from pipeline import feature_engineering; feature_engineering.run()"

      - name: Step 3 - 特徴量マージ (irbank × 株価)
        if: ${{ github.event.inputs.signals_only != 'true' }}
        run: |
          python -c "from pipeline import merge_features; merge_features.run()"

      - name: Debug - 年度_num vs 提出日の分布確認
        if: ${{ github.event.inputs.signals_only != 'true' }}
        run: |
          python3 -c "
import pandas as pd
df = pd.read_csv('output/features.csv', encoding='utf-8-sig', usecols=['年度_num', '提出日', '_四半期'], low_memory=False)
df['提出日'] = pd.to_datetime(df['提出日'], errors='coerce')
df['提出年'] = df['提出日'].dt.year

print('=== 年度_num ごとの提出日の年の分布（通期のみ） ===')
通期 = df[df['_四半期'] == '通期']
cross = pd.crosstab(通期['年度_num'], 通期['提出年'])
print(cross.tail(10).to_string())

print()
print('=== train/val/test の提出日範囲 ===')
for label, mask in [('train(≤2022)', df['年度_num'] <= 2022), ('val(2023)', df['年度_num'] == 2023), ('test(≥2024)', df['年度_num'] >= 2024)]:
    sub = df[mask]['提出日'].dropna()
    print(f'{label}: {sub.min().date()} 〜 {sub.max().date()} ({len(sub):,}件)')
"

      - name: Step 4 - モデルトレーニング (LightGBM)
        if: ${{ github.event.inputs.signals_only != 'true' }}
        run: |
          python -c "from pipeline import train_model; train_model.run()"

      - name: Step 5 - バックテスト
        if: ${{ github.event.inputs.signals_only != 'true' }}
        run: |
          python -c "from pipeline import backtest; backtest.run()"

      - name: Step 6 - シグナル生成
        run: |
          mkdir -p output
          python -c "from pipeline import generate_signals; generate_signals.run()"

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/features.csv \
                  output/irbank_features.csv \
                  output/feature_importance.csv \
                  output/backtest_result.csv \
                  output/backtest_summary.csv \
                  output/backtest_monthly.csv \
                  output/signals.csv \
                  2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto: ML pipeline run $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin main || true
