name: Test EDINET

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas -q
      - name: Run test
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python test_edinet.py 2>&1 | tee output/test_result.txt
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          git add output/test_result.txt
          git diff --cached --quiet || git commit -m "Test result"
          git push
